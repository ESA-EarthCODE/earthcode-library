[workspace]
authors = [
    "Krasen Samardzhiev <krasensam@gmail.com>",
    "Deyan Samardzhiev <dean@lampata.co.uk>",
]
channels = ["conda-forge"]
name = "earthcode"
platforms = ["linux-64", "win-64", "osx-arm64"]
version = "0.1.0"

[tasks]
docs = "jupyter-book build ."

[dependencies]
python = ">=3.12"
pystac = ">=1.14.1,<2"
xarray = ">=2025.12.0,<2026"
shapely = ">=2.1.2,<3"
xstac = ">=1.2.0,<2"
zarr = ">=3.1.5,<4"
dask = ">=2025.12.0,<2026"
netcdf4 = ">=1.7.3,<2"
bottleneck = ">=1.6.0,<2"
rioxarray = ">=0.20.0,<0.21"
geopandas = ">=1.1.2,<2"
pyarrow = ">=23.0.0,<24"
pylance = ">=2.0.1,<3"
pillow = ">=10.3,<12"
onnxruntime = ">=1.24.1,<2"
platformdirs = ">=4.5.0,<5"
tokenizers = ">=0.22.2,<1"
PyYAML = ">=6.0.3"

[target.osx-arm64.dependencies]
python = ">=3.12,<3.14"

[feature.dev.dependencies]
jupyter-book = ">=1.0.4,<2"
jupyterlab = ">=4.5.0,<5"
pytest = ">=9.0.2,<10"
pytest-cov = ">=7.0.0,<8"
papermill = ">=2.7.0,<3"

[environments]
production = { features = [], solve-group = "prod" }
default = { features = ["dev"], solve-group = "prod" }

[pypi-dependencies]
earthcode = { path = ".", editable = true }
