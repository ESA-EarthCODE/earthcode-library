name: Docs

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - guide/**
      - examples/**
      - _config.yml
      - _toc.yml
      - pixi.toml
      - pixi.lock
      - pyproject.toml
      - .github/workflows/pages.yml
  pull_request:
    paths:
      - README.md
      - guide/**
      - examples/**
      - _config.yml
      - _toc.yml
      - pixi.toml
      - pixi.lock
      - pyproject.toml
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Jupyter Book
        run: python -m pip install --upgrade "jupyter-book>=1.0.4,<2"

      - name: Build site
        run: jupyter-book build .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    name: Deploy Docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
